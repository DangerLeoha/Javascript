    <!--2.Вложенный if...else + логическое И (&&) и ИЛИ (||)
Условие:
Напишите функцию canRentCar(age, hasLicense, isDrunk, country), которая определяет, может ли человек арендовать автомобиль в указанной стране.
Правила:
В России: можно арендовать, если возраст ≥ 20, есть права и не пьян.
В Германии: возраст ≥ 21, есть права, не пьян, и стаж ≥ 2 года (но стажа у нас нет — поэтому считаем, что если возраст ≥ 23 — стаж есть).
В США: возраст ≥ 25 или (возраст ≥ 18 и есть права и не пьян).
Функция принимает:
age — число,
hasLicense — boolean,
isDrunk — boolean,
country — строка ("RU", "DE", "US").
Верните true или false.-->

<!--3. Напишите функцию canEnterClub(age, hasVIPPass, isDrunk, dayOfWeek), которая определяет, может ли человек попасть в ночной клуб.
Правила:
В будние дни (Monday–Thursday):
Можно попасть, если возраст ≥ 18 и не пьян.
Если есть VIP-пасс, возраст можно не проверять, но нельзя быть пьяным.
В выходные (Friday–Sunday):
Можно попасть, если возраст ≥ 21 и не пьян.
Если есть VIP-пасс, возраст ≥ 18 и не пьян.
Функция принимает:
age — число,
hasVIPPass — boolean,
isDrunk — boolean,
dayOfWeek — строка ("Monday", "Tuesday", …, "Sunday").
Возвращает true или false.-->
